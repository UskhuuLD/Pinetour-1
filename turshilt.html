<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avengers Movies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:rgb(38, 41, 47);
            text-align: center;
        }

        h1 {
            color: rgb(224, 224, 246);
        }

        .movie-card {
            background-color: darkslategrey;
            width: 400px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid black;
        }

        .movie-card img {
            width: 230px;
            border-radius: 10px;
        }

        .movie-card h3 {
            color: white;
        }
    </style>
</head>
<body>

    <h1>Avengers Movies</h1>

    <div class="movie-card">
        <img src="download (1).jpeg" alt="The Avengers">
        <h3>The Avengers</h3>
    </div>

    <div class="movie-card">
        <img src="Avengers_Age_of_Ultron_poster.jpg" alt="Age of Ultron">
        <h3>Avengers: Age of Ultron</h3>
    </div>

    <div class="movie-card">
        <img src="avengers-infinity-war-poster (1).webp" alt="Infinity War">
        <h3>Avengers: Infinity War</h3>
    </div>

    <div class="movie-card">
        <img src="avengers-infinity-war-poster.webp" alt="Endgame">
        <h3>Avengers: Endgame</h3>
    </div>

</body>
</html>
